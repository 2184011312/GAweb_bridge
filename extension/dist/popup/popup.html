<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Arc Tunnel</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .connected { background: #d4edda; color: #155724; }
    .disconnected { background: #f8d7da; color: #721c24; }
    p {
      font-size: 12px;
      color: #666;
      margin: 0;
    }
  </style>
</head>
<body>
  <h2>Arc Tunnel</h2>
  <div id="status" class="status disconnected">
    Status: Disconnected
  </div>
  <p>Extension is running in the background.</p>
  <script src="popup.js"></script>
</body>
</html>
